name: RoflCam
options:
  bundleIdPrefix: com.turbi
targets:
  RoflCam:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - RoflCam
    info:
      path: RoflCam/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: Need camera access to stream video.
        NSLocalNetworkUsageDescription: Need network access to communicate with PC.
        NSBonjourServices:
          - "_roflcam._tcp"
        UIBackgroundModes:
          - fetch
          - processing
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGN_ENTITLEMENTS: ""
      ENABLE_USER_SCRIPT_SANDBOXING: "NO"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
